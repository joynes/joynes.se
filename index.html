<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>joynes.se</title>
  <style>
    :root {
      --bg: #040406;
      --ink: #fff4d2;
      --muted: #bcb4a3;
      --amber: #ffb000;
      --orange: #ff5a00;
      --red: #df1d2d;
      --cyan: #31f3ff;
      --blue: #3158ff;
      --green: #51ff8a;
      --panel: rgba(9, 9, 14, 0.76);
      --line: rgba(255, 176, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "Lucida Console", "Courier New", monospace;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background: #040406;
      --chaos-hue: 0deg;
      --drift-x: 0px;
      --drift-y: 0px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.055) 0,
          rgba(255, 255, 255, 0.055) 1px,
          transparent 2px,
          transparent 5px
        ),
        radial-gradient(circle at 50% 100%, rgba(255, 176, 0, 0.18), transparent 32rem);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(90deg, rgba(223, 29, 45, 0.2), transparent 18%, transparent 82%, rgba(49, 243, 255, 0.2)),
        radial-gradient(circle at 18% 18%, rgba(49, 88, 255, 0.22), transparent 20rem),
        radial-gradient(circle at 80% 28%, rgba(81, 255, 138, 0.14), transparent 18rem);
      pointer-events: none;
    }

    a {
      color: var(--cyan);
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      color: var(--green);
      text-shadow: 0 0 10px currentColor;
    }

    #shader {
      position: fixed;
      inset: 0;
      z-index: -4;
      width: 100vw;
      height: 100vh;
      background: #040406;
    }

    #sprites {
      position: fixed;
      inset: 0;
      z-index: -3;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 176, 0, 0.32);
      background: rgba(4, 4, 6, 0.72);
      backdrop-filter: blur(10px);
    }

    .topbar-inner {
      width: min(1220px, calc(100% - 28px));
      min-height: 58px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .mark {
      color: var(--amber);
      font-weight: 700;
      text-transform: uppercase;
      display: inline-block;
      filter: hue-rotate(var(--chaos-hue));
      text-shadow:
        2px 0 0 var(--red),
        -2px 0 0 var(--blue),
        0 0 16px rgba(255, 176, 0, 0.85);
      white-space: nowrap;
      animation: microGlitch 2.7s steps(1, end) infinite;
    }

    .status {
      color: var(--green);
      font-size: 12px;
      text-transform: uppercase;
      text-align: right;
      text-shadow: 0 0 12px rgba(81, 255, 138, 0.8);
      animation: tickerDrift 7s ease-in-out infinite;
    }

    .shell {
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 58px;
    }

    .hero {
      position: relative;
      min-height: calc(100vh - 86px);
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(300px, 0.92fr);
      align-items: center;
      gap: 34px;
      perspective: 1100px;
    }

    .hero::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8vh;
      width: 160vw;
      height: 58vh;
      transform: translateX(-50%) rotateX(64deg);
      transform-origin: bottom center;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 100% 34px, 70px 100%;
      filter: drop-shadow(0 0 10px rgba(255, 176, 0, 0.48));
      opacity: 0.7;
      animation: gridRun 4.2s linear infinite, gridPulse 3.8s ease-in-out infinite;
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 8% -10% 0;
      z-index: 0;
      background:
        conic-gradient(from 0deg at 50% 50%, transparent, rgba(49, 243, 255, 0.16), transparent, rgba(255, 176, 0, 0.15), transparent),
        radial-gradient(circle at 20% 55%, rgba(223, 29, 45, 0.16), transparent 13rem),
        radial-gradient(circle at 70% 35%, rgba(81, 255, 138, 0.13), transparent 13rem);
      filter: blur(1px) saturate(1.35);
      opacity: 0.9;
      animation: colorWash 9s linear infinite;
      pointer-events: none;
    }

    @keyframes gridRun {
      from { background-position: 0 0, 0 0; }
      to { background-position: 0 34px, 70px 0; }
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.48; filter: drop-shadow(0 0 8px rgba(255, 176, 0, 0.38)); }
      45% { opacity: 0.86; filter: drop-shadow(0 0 16px rgba(49, 243, 255, 0.7)); }
      68% { opacity: 0.62; filter: drop-shadow(0 0 12px rgba(223, 29, 45, 0.5)); }
    }

    @keyframes colorWash {
      from { transform: rotate(0deg) scale(1); filter: hue-rotate(0deg) saturate(1.3); }
      50% { transform: rotate(180deg) scale(1.08); filter: hue-rotate(120deg) saturate(1.7); }
      to { transform: rotate(360deg) scale(1); filter: hue-rotate(360deg) saturate(1.3); }
    }

    @keyframes microGlitch {
      0%, 83%, 100% { transform: translate(0, 0) skewX(0deg); }
      84% { transform: translate(2px, -1px) skewX(-7deg); }
      85% { transform: translate(-3px, 1px) skewX(5deg); }
      87% { transform: translate(1px, 0) skewX(0deg); }
    }

    @keyframes tickerDrift {
      0%, 100% { transform: translateX(0); color: var(--green); }
      33% { transform: translateX(-7px); color: var(--cyan); }
      67% { transform: translateX(5px); color: var(--amber); }
    }

    .intro {
      position: relative;
      z-index: 1;
      transform-style: preserve-3d;
      animation: titleFloat 5.5s ease-in-out infinite, colorBob 11s linear infinite;
    }

    @keyframes titleFloat {
      0%, 100% { transform: rotateY(-4deg) rotateX(0deg) translate(var(--drift-x), var(--drift-y)); }
      50% { transform: rotateY(3deg) rotateX(2deg) translate(calc(var(--drift-x) * -0.4), calc(var(--drift-y) - 10px)); }
    }

    @keyframes colorBob {
      from { filter: hue-rotate(0deg); }
      to { filter: hue-rotate(360deg); }
    }

    h1 {
      position: relative;
      margin: 0;
      color: var(--amber);
      font-size: clamp(56px, 14vw, 170px);
      line-height: 0.82;
      text-transform: lowercase;
      text-shadow:
        5px 0 0 #b51422,
        10px 0 0 #2426b8,
        0 0 26px rgba(255, 176, 0, 0.92),
        0 20px 0 rgba(0, 0, 0, 0.62);
      animation: h1Warp 4.6s ease-in-out infinite;
    }

    h1::before,
    h1::after {
      content: "joynes";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.58;
      mix-blend-mode: screen;
    }

    h1::before {
      color: var(--cyan);
      transform: translate(5px, -2px);
      clip-path: polygon(0 0, 100% 0, 100% 42%, 0 34%);
      animation: glitchSliceA 2.1s steps(1, end) infinite;
    }

    h1::after {
      color: var(--red);
      transform: translate(-5px, 3px);
      clip-path: polygon(0 58%, 100% 51%, 100% 100%, 0 100%);
      animation: glitchSliceB 2.8s steps(1, end) infinite;
    }

    @keyframes h1Warp {
      0%, 100% { letter-spacing: 0; transform: skewX(0deg); }
      36% { letter-spacing: 2px; transform: skewX(-1.5deg); }
      70% { letter-spacing: 0; transform: skewX(1deg); }
    }

    @keyframes glitchSliceA {
      0%, 86%, 100% { transform: translate(5px, -2px); }
      87% { transform: translate(14px, -4px); }
      89% { transform: translate(-7px, 2px); }
    }

    @keyframes glitchSliceB {
      0%, 78%, 100% { transform: translate(-5px, 3px); }
      79% { transform: translate(-16px, 5px); }
      81% { transform: translate(8px, -2px); }
    }

    .tagline {
      max-width: 760px;
      margin: 24px 0 0;
      color: var(--ink);
      font-size: clamp(18px, 2.6vw, 31px);
      line-height: 1.25;
      text-shadow: 0 0 14px rgba(49, 243, 255, 0.78);
      animation: textSwim 6.8s ease-in-out infinite;
    }

    @keyframes textSwim {
      0%, 100% { transform: translateX(0) rotateZ(0deg); color: var(--ink); }
      34% { transform: translateX(8px) rotateZ(-0.4deg); color: #dffcff; }
      71% { transform: translateX(-5px) rotateZ(0.3deg); color: #ffe8a8; }
    }

    .category-panel {
      position: relative;
      z-index: 2;
      padding: 18px;
      border: 1px solid rgba(255, 176, 0, 0.42);
      border-radius: 6px;
      background:
        linear-gradient(145deg, rgba(255, 90, 0, 0.14), transparent 42%),
        rgba(7, 7, 12, 0.72);
      box-shadow:
        0 0 0 1px rgba(49, 88, 255, 0.18),
        0 22px 56px rgba(0, 0, 0, 0.58),
        inset 0 0 42px rgba(49, 243, 255, 0.06);
      animation: panelOrbit 7.5s ease-in-out infinite;
    }

    @keyframes panelOrbit {
      0%, 100% { transform: translateY(0) rotateX(0deg) rotateY(0deg); }
      40% { transform: translateY(-8px) rotateX(1.8deg) rotateY(-2deg); }
      76% { transform: translateY(4px) rotateX(-1deg) rotateY(2deg); }
    }

    .panel-label {
      margin: 0 0 14px;
      color: var(--green);
      font-size: 12px;
      text-transform: uppercase;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .category-button {
      min-height: 74px;
      padding: 12px;
      border: 1px solid rgba(49, 243, 255, 0.36);
      border-radius: 4px;
      color: var(--ink);
      background: rgba(0, 0, 0, 0.3);
      font: inherit;
      text-align: left;
      cursor: pointer;
      box-shadow: 4px 4px 0 rgba(255, 90, 0, 0.42);
      animation: buttonWander calc(5s + var(--delay, 0s)) ease-in-out infinite;
      transition: transform 160ms ease, color 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .category-button:hover,
    .category-button:focus-visible,
    .category-button.active {
      transform: translateY(-5px) rotateZ(-0.6deg);
      color: var(--green);
      border-color: var(--green);
      background: rgba(49, 88, 255, 0.18);
      box-shadow:
        4px 4px 0 rgba(255, 90, 0, 0.7),
        0 0 22px rgba(49, 243, 255, 0.24);
      outline: none;
    }

    @keyframes buttonWander {
      0%, 100% { filter: hue-rotate(0deg) saturate(1); }
      31% { filter: hue-rotate(34deg) saturate(1.3); }
      64% { filter: hue-rotate(-28deg) saturate(1.45); }
    }

    .category-name {
      display: block;
      color: var(--amber);
      font-size: 17px;
      text-transform: uppercase;
    }

    .category-sub {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .stage {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: minmax(300px, 0.8fr) minmax(0, 1.2fr);
      gap: 18px;
      margin-top: -24px;
      padding: 20px;
      border: 1px solid rgba(255, 176, 0, 0.32);
      border-radius: 6px;
      background: rgba(4, 4, 8, 0.68);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      animation: stageHover 9s ease-in-out infinite;
    }

    @keyframes stageHover {
      0%, 100% { transform: translateY(0); border-color: rgba(255, 176, 0, 0.32); }
      45% { transform: translateY(-7px); border-color: rgba(49, 243, 255, 0.48); }
      72% { transform: translateY(3px); border-color: rgba(255, 90, 0, 0.44); }
    }

    .stage-visual {
      position: relative;
      min-height: 360px;
      overflow: hidden;
      border: 1px solid rgba(49, 243, 255, 0.34);
      border-radius: 5px;
      background:
        radial-gradient(circle at 50% 42%, rgba(49, 243, 255, 0.22), transparent 9rem),
        radial-gradient(circle at 58% 58%, rgba(255, 176, 0, 0.18), transparent 14rem),
        linear-gradient(180deg, rgba(16, 16, 24, 0.78), rgba(0, 0, 0, 0.68));
      filter: hue-rotate(var(--chaos-hue));
    }

    .stage-visual::before {
      content: "";
      position: absolute;
      inset: 17% 12%;
      border: 2px solid var(--cyan);
      transform: rotateX(66deg) rotateZ(45deg);
      box-shadow:
        0 0 26px rgba(49, 243, 255, 0.7),
        inset 0 0 32px rgba(255, 176, 0, 0.28);
      animation: portalSpin 5.5s linear infinite, portalBreathe 2.7s ease-in-out infinite;
    }

    .stage-visual::after {
      content: attr(data-glyph);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--amber);
      font-size: clamp(54px, 11vw, 140px);
      font-weight: 700;
      text-shadow:
        4px 0 0 var(--red),
        -4px 0 0 var(--blue),
        0 0 30px rgba(255, 176, 0, 0.8);
      animation: glyphFloat 2.9s ease-in-out infinite, glyphChaos 5.8s steps(1, end) infinite;
    }

    @keyframes portalSpin {
      from { transform: rotateX(66deg) rotateZ(0deg); }
      to { transform: rotateX(66deg) rotateZ(360deg); }
    }

    @keyframes glyphFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.04); }
    }

    @keyframes portalBreathe {
      0%, 100% { inset: 17% 12%; border-color: var(--cyan); }
      50% { inset: 11% 18%; border-color: var(--amber); }
    }

    @keyframes glyphChaos {
      0%, 100% { filter: hue-rotate(0deg); }
      29% { filter: hue-rotate(95deg); }
      57% { filter: hue-rotate(205deg); }
      78% { filter: hue-rotate(-45deg); }
    }

    .stage-copy {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 16px;
      padding: 4px;
    }

    .kicker {
      color: var(--green);
      font-size: 12px;
      text-transform: uppercase;
      animation: textSwim 5.6s ease-in-out infinite reverse;
    }

    h2 {
      margin: 0;
      color: var(--amber);
      font-size: clamp(34px, 6vw, 74px);
      line-height: 0.95;
      text-transform: uppercase;
      text-shadow:
        3px 0 0 var(--red),
        0 0 18px rgba(255, 176, 0, 0.8);
      animation: textSwim 7.2s ease-in-out infinite;
    }

    .description {
      max-width: 820px;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.65;
      animation: textSwim 8.4s ease-in-out infinite reverse;
    }

    .featured {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      padding: 9px 12px;
      border: 1px solid currentColor;
      color: var(--cyan);
      background: rgba(0, 0, 0, 0.28);
      font-size: 12px;
      text-transform: uppercase;
      box-shadow: 3px 3px 0 rgba(255, 90, 0, 0.58);
      transition: transform 150ms ease, filter 150ms ease, color 150ms ease;
    }

    .button:hover {
      transform: translateY(-3px) rotateZ(-1deg);
      filter: hue-rotate(80deg) saturate(1.4);
    }

    .content-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .item {
      min-height: 132px;
      display: grid;
      align-content: space-between;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(255, 176, 0, 0.34);
      border-radius: 4px;
      background:
        linear-gradient(135deg, rgba(255, 90, 0, 0.14), transparent 48%),
        rgba(9, 9, 14, 0.76);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.36);
      animation: itemFloat calc(6s + var(--float-delay, 0s)) ease-in-out infinite;
      transition: transform 170ms ease, border-color 170ms ease, box-shadow 170ms ease;
    }

    .item:hover {
      transform: translateY(-7px) rotateX(3deg) rotateZ(-0.5deg);
      border-color: var(--cyan);
      box-shadow:
        0 18px 38px rgba(0, 0, 0, 0.45),
        0 0 22px rgba(49, 243, 255, 0.18);
    }

    @keyframes itemFloat {
      0%, 100% { translate: 0 0; filter: hue-rotate(0deg); }
      38% { translate: 0 -5px; filter: hue-rotate(16deg); }
      74% { translate: 0 3px; filter: hue-rotate(-22deg); }
    }

    .item-title {
      margin: 0;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .item-meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    footer {
      padding: 34px 0 18px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .hero,
      .stage {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: auto;
        padding: 46px 0 38px;
      }

      .stage {
        margin-top: 0;
      }

      .stage-visual {
        min-height: 240px;
      }
    }

    @media (max-width: 620px) {
      .topbar-inner {
        display: block;
        padding: 12px 0;
      }

      .status {
        margin-top: 6px;
        text-align: left;
      }

      .category-grid,
      .content-list {
        grid-template-columns: 1fr;
      }

      .hero {
        gap: 16px;
        padding-top: 22px;
      }

      .category-panel {
        position: sticky;
        top: 56px;
        z-index: 9;
        padding: 10px;
        margin-inline: -6px;
        border-radius: 4px;
      }

      .panel-label {
        margin-bottom: 8px;
        font-size: 11px;
      }

      .category-grid {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 0 0 8px;
        scroll-snap-type: x mandatory;
      }

      .category-button {
        flex: 0 0 118px;
        min-height: 48px;
        padding: 9px;
        scroll-snap-align: start;
        box-shadow: 2px 2px 0 rgba(255, 90, 0, 0.55);
      }

      .category-name {
        font-size: 13px;
      }

      .category-sub {
        display: none;
      }

      h1 {
        font-size: clamp(48px, 22vw, 104px);
      }

      .tagline {
        margin-top: 14px;
        font-size: 17px;
      }

      .stage {
        padding: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="shader" aria-hidden="true"></canvas>
  <canvas id="sprites" aria-hidden="true"></canvas>

  <header class="topbar">
    <div class="topbar-inner">
      <a class="mark" href="#top">joynes.se</a>
      <div class="status">Drive-linked archive // no media in GitHub</div>
    </div>
  </header>

  <main id="top" class="shell">
    <section class="hero" aria-labelledby="site-title">
      <div class="intro">
        <h1 id="site-title">joynes</h1>
        <p class="tagline">A time tunnel for old music, games, films, pictures and text from the Joynes archive.</p>
      </div>

      <aside class="category-panel" aria-labelledby="choose-title">
        <p id="choose-title" class="panel-label">Choose a portal</p>
        <div id="categoryGrid" class="category-grid"></div>
      </aside>
    </section>

    <section class="stage" aria-live="polite">
      <div id="stageVisual" class="stage-visual" data-glyph="M"></div>
      <div class="stage-copy">
        <div id="stageKicker" class="kicker"></div>
        <h2 id="stageTitle"></h2>
        <p id="stageDescription" class="description"></p>
        <div id="stageFeatured" class="featured"></div>
      </div>
    </section>

    <section id="contentList" class="content-list" aria-label="Selected archive items"></section>

    <footer>
      joynes.se // HTML on GitHub Pages // archive files linked directly from Google Drive
    </footer>
  </main>

  <script>
    const categories = [
      {
        id: "music",
        name: "Music",
        sub: "Finished tracks from the release folder.",
        glyph: "M",
        kicker: "Main archive level",
        title: "Music",
        description: "The main Joynes tracks are presented as a playable journey through the old archive. Files stay on Google Drive; this page is the control room.",
        featured: [
          ["Jaro and grodan", "https://drive.google.com/file/d/18ftDgEyaIUtr4OsRF_DPhtqW_Vt4BhEg/view"],
          ["SOR the bridge", "https://drive.google.com/file/d/15ikpxU4WS3vS9GEuhMsEZC7Z5KErUtGj/view"],
          ["NinjaNeedsBass", "https://drive.google.com/file/d/1qfVi5GcYoXM1fx8aKOIdlLIUGFCkdXRx/view"]
        ],
        items: [

    const grid = document.querySelector("#categoryGrid");
    const visual = document.querySelector("#stageVisual");
    const kicker = document.querySelector("#stageKicker");
    const title = document.querySelector("#stageTitle");
    const description = document.querySelector("#stageDescription");
    const featured = document.querySelector("#stageFeatured");
    const list = document.querySelector("#contentList");

    function linkButton(label, href) {
      const a = document.createElement("a");
      a.className = "button";
      a.textContent = label;
      a.href = href;
      return a;
    }

    function renderCategory(category) {
      document.querySelectorAll(".category-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.category === category.id);
      });

      visual.dataset.glyph = category.glyph;
      kicker.textContent = category.kicker;
      title.textContent = category.title;
      description.textContent = category.description;

      featured.replaceChildren(...category.featured.map(([label, href]) => linkButton(label, href)));

      list.replaceChildren(...category.items.map(([name, meta, actions]) => {
        const article = document.createElement("article");
        article.className = "item";
        article.style.setProperty("--float-delay", `${(name.length % 7) * 0.45}s`);

        const head = document.createElement("div");
        const h3 = document.createElement("h3");
        h3.className = "item-title";
        h3.textContent = name;
        const p = document.createElement("p");
        p.className = "item-meta";
        p.textContent = meta;
        head.append(h3, p);

        const actionRow = document.createElement("div");
        actionRow.className = "item-actions";
        actions.forEach(([label, href]) => actionRow.append(linkButton(label, href)));

        article.append(head, actionRow);
        return article;
      }));
    }

    categories.forEach((category) => {
      const button = document.createElement("button");
      button.className = "category-button";
      button.type = "button";
      button.dataset.category = category.id;
      button.innerHTML = `<span class="category-name"></span><span class="category-sub"></span>`;
      button.querySelector(".category-name").textContent = category.name;
      button.querySelector(".category-sub").textContent = category.sub;
      button.style.setProperty("--delay", `${(categories.indexOf(category) % 5) * 0.55}s`);
      button.addEventListener("click", () => renderCategory(category));
      grid.append(button);
    });

    renderCategory(categories[0]);

    const canvas = document.querySelector("#shader");
    const gl = canvas.getContext("webgl", { antialias: false, alpha: false });

    if (gl) {
      const vertexSource = `
        attribute vec2 position;
        void main() {
          gl_Position = vec4(position, 0.0, 1.0);
        }
      `;

      const fragmentSource = `
        precision mediump float;
        uniform vec2 resolution;
        uniform float time;

        float wave(vec2 p, float speed, float scale) {
          return sin(p.x * scale + time * speed) + cos(p.y * scale * 0.8 - time * speed * 0.7);
        }

        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
        }

        void main() {
          vec2 uv = gl_FragCoord.xy / resolution.xy;
          vec2 p = (uv - 0.5) * vec2(resolution.x / resolution.y, 1.0);
          vec2 q = p;
          q.x += 0.08 * sin(time * 0.9 + p.y * 7.0);
          q.y += 0.08 * cos(time * 0.7 + p.x * 9.0);
          float v = wave(q, 1.7, 7.0) + wave(q.yx + 0.35, 1.2, 10.0) + wave(q + vec2(sin(time), cos(time)), 2.2, 15.0);
          float rings = sin(28.0 * length(q) - time * 4.0);
          float tunnel = 0.09 / max(0.05, abs(length(q) - 0.30 + 0.055 * sin(time + q.x * 8.0)));
          float stars = step(0.985, hash(floor((uv + vec2(time * 0.015, -time * 0.02)) * resolution.xy / 4.0)));
          vec3 base = 0.5 + 0.5 * cos(time * 0.55 + vec3(0.0, 2.1, 4.2) + v * 1.2 + rings);
          vec3 sega = vec3(0.01, 0.02, 0.07) + base * 0.26;
          vec3 amber = vec3(1.0, 0.45, 0.0) * tunnel * 0.32;
          vec3 cyan = vec3(0.0, 0.85, 1.0) * smoothstep(0.92, 0.08, length(q + vec2(0.18, -0.06))) * 0.28;
          vec3 magenta = vec3(1.0, 0.02, 0.8) * smoothstep(0.84, 0.06, length(q - vec2(0.25, 0.09))) * 0.22;
          vec3 green = vec3(0.18, 1.0, 0.35) * smoothstep(0.72, 0.08, length(q - vec2(-0.22, 0.22))) * 0.18;
          float scan = 0.82 + 0.18 * sin(gl_FragCoord.y * 2.7 + time * 7.0);
          gl_FragColor = vec4((sega + amber + cyan + magenta + green + stars * vec3(0.9, 0.8, 1.0)) * scan, 1.0);
        }
      `;

      function shader(type, source) {
        const compiled = gl.createShader(type);
        gl.shaderSource(compiled, source);
        gl.compileShader(compiled);
        return compiled;
      }

      const program = gl.createProgram();
      gl.attachShader(program, shader(gl.VERTEX_SHADER, vertexSource));
      gl.attachShader(program, shader(gl.FRAGMENT_SHADER, fragmentSource));
      gl.linkProgram(program);
      gl.useProgram(program);

      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
      const position = gl.getAttribLocation(program, "position");
      gl.enableVertexAttribArray(position);
      gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

      const resolution = gl.getUniformLocation(program, "resolution");
      const time = gl.getUniformLocation(program, "time");
      let start = performance.now();

      function draw(now) {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const width = Math.floor(innerWidth * dpr);
        const height = Math.floor(innerHeight * dpr);
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
          gl.viewport(0, 0, width, height);
        }
        gl.uniform2f(resolution, width, height);
        gl.uniform1f(time, (now - start) / 1000);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    }

    const spriteCanvas = document.querySelector("#sprites");
    const spriteCtx = spriteCanvas.getContext("2d");
    const glyphs = ["*", "+", "x", "0", "1", "M", "G", "J", "F", ">", "<", "#"];
    const sprites = Array.from({ length: 58 }, (_, index) => ({
      x: Math.random(),
      y: Math.random(),
      speed: 0.08 + Math.random() * 0.42,
      size: 10 + Math.random() * 28,
      phase: Math.random() * Math.PI * 2,
      glyph: glyphs[index % glyphs.length],
      hue: Math.random() * 360
    }));

    function drawSprites(now) {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const width = Math.floor(innerWidth * dpr);
      const height = Math.floor(innerHeight * dpr);
      if (spriteCanvas.width !== width || spriteCanvas.height !== height) {
        spriteCanvas.width = width;
        spriteCanvas.height = height;
      }
      spriteCtx.clearRect(0, 0, width, height);
      spriteCtx.save();
      spriteCtx.scale(dpr, dpr);
      const t = now / 1000;
      sprites.forEach((sprite, index) => {
        const x = ((sprite.x * innerWidth) + Math.sin(t * sprite.speed + sprite.phase) * 80 + t * (8 + index % 5)) % (innerWidth + 80) - 40;
        const y = ((sprite.y * innerHeight) + Math.cos(t * sprite.speed * 0.8 + sprite.phase) * 55 + t * (index % 3)) % (innerHeight + 80) - 40;
        spriteCtx.save();
        spriteCtx.translate(x, y);
        spriteCtx.rotate(Math.sin(t * sprite.speed + sprite.phase) * 0.5);
        spriteCtx.font = `${sprite.size}px "Lucida Console", monospace`;
        spriteCtx.fillStyle = `hsla(${(sprite.hue + t * 70) % 360}, 100%, 65%, 0.26)`;
        spriteCtx.shadowColor = `hsla(${(sprite.hue + 80) % 360}, 100%, 64%, 0.65)`;
        spriteCtx.shadowBlur = 16;
        spriteCtx.fillText(sprite.glyph, 0, 0);
        spriteCtx.restore();
      });
      spriteCtx.restore();
      document.body.style.setProperty("--chaos-hue", `${Math.sin(t * 0.42) * 85}deg`);
      document.body.style.setProperty("--drift-x", `${Math.sin(t * 0.9) * 7}px`);
      document.body.style.setProperty("--drift-y", `${Math.cos(t * 0.72) * 5}px`);
      requestAnimationFrame(drawSprites);
    }

    requestAnimationFrame(drawSprites);
  </script>
