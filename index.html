<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>joynes.se</title>
  <style>
    :root {
      --bg: #040406;
      --ink: #fff4d2;
      --muted: #bcb4a3;
      --amber: #ffb000;
      --orange: #ff5a00;
      --red: #df1d2d;
      --cyan: #31f3ff;
      --blue: #3158ff;
      --green: #51ff8a;
      --panel: rgba(9, 9, 14, 0.76);
      --line: rgba(255, 176, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "Lucida Console", "Courier New", monospace;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background: #040406;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.055) 0,
          rgba(255, 255, 255, 0.055) 1px,
          transparent 2px,
          transparent 5px
        ),
        radial-gradient(circle at 50% 100%, rgba(255, 176, 0, 0.18), transparent 32rem);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(90deg, rgba(223, 29, 45, 0.2), transparent 18%, transparent 82%, rgba(49, 243, 255, 0.2)),
        radial-gradient(circle at 18% 18%, rgba(49, 88, 255, 0.22), transparent 20rem),
        radial-gradient(circle at 80% 28%, rgba(81, 255, 138, 0.14), transparent 18rem);
      pointer-events: none;
    }

    a {
      color: var(--cyan);
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      color: var(--green);
      text-shadow: 0 0 10px currentColor;
    }

    #shader {
      position: fixed;
      inset: 0;
      z-index: -4;
      width: 100vw;
      height: 100vh;
      background: #040406;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 176, 0, 0.32);
      background: rgba(4, 4, 6, 0.72);
      backdrop-filter: blur(10px);
    }

    .topbar-inner {
      width: min(1220px, calc(100% - 28px));
      min-height: 58px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .mark {
      color: var(--amber);
      font-weight: 700;
      text-transform: uppercase;
      text-shadow:
        2px 0 0 var(--red),
        -2px 0 0 var(--blue),
        0 0 16px rgba(255, 176, 0, 0.85);
      white-space: nowrap;
    }

    .status {
      color: var(--green);
      font-size: 12px;
      text-transform: uppercase;
      text-align: right;
    }

    .shell {
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 58px;
    }

    .hero {
      position: relative;
      min-height: calc(100vh - 86px);
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(300px, 0.92fr);
      align-items: center;
      gap: 34px;
      perspective: 1100px;
    }

    .hero::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8vh;
      width: 160vw;
      height: 58vh;
      transform: translateX(-50%) rotateX(64deg);
      transform-origin: bottom center;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 100% 34px, 70px 100%;
      filter: drop-shadow(0 0 10px rgba(255, 176, 0, 0.48));
      opacity: 0.7;
      animation: gridRun 5.5s linear infinite;
      pointer-events: none;
    }

    @keyframes gridRun {
      from { background-position: 0 0, 0 0; }
      to { background-position: 0 34px, 70px 0; }
    }

    .intro {
      position: relative;
      z-index: 1;
      transform-style: preserve-3d;
      animation: titleFloat 5.5s ease-in-out infinite;
    }

    @keyframes titleFloat {
      0%, 100% { transform: rotateY(-4deg) translateY(0); }
      50% { transform: rotateY(3deg) translateY(-8px); }
    }

    h1 {
      margin: 0;
      color: var(--amber);
      font-size: clamp(56px, 14vw, 170px);
      line-height: 0.82;
      text-transform: lowercase;
      text-shadow:
        5px 0 0 #b51422,
        10px 0 0 #2426b8,
        0 0 26px rgba(255, 176, 0, 0.92),
        0 20px 0 rgba(0, 0, 0, 0.62);
    }

    .tagline {
      max-width: 760px;
      margin: 24px 0 0;
      color: var(--ink);
      font-size: clamp(18px, 2.6vw, 31px);
      line-height: 1.25;
      text-shadow: 0 0 14px rgba(49, 243, 255, 0.78);
    }

    .category-panel {
      position: relative;
      z-index: 2;
      padding: 18px;
      border: 1px solid rgba(255, 176, 0, 0.42);
      border-radius: 6px;
      background:
        linear-gradient(145deg, rgba(255, 90, 0, 0.14), transparent 42%),
        rgba(7, 7, 12, 0.72);
      box-shadow:
        0 0 0 1px rgba(49, 88, 255, 0.18),
        0 22px 56px rgba(0, 0, 0, 0.58),
        inset 0 0 42px rgba(49, 243, 255, 0.06);
    }

    .panel-label {
      margin: 0 0 14px;
      color: var(--green);
      font-size: 12px;
      text-transform: uppercase;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .category-button {
      min-height: 74px;
      padding: 12px;
      border: 1px solid rgba(49, 243, 255, 0.36);
      border-radius: 4px;
      color: var(--ink);
      background: rgba(0, 0, 0, 0.3);
      font: inherit;
      text-align: left;
      cursor: pointer;
      box-shadow: 4px 4px 0 rgba(255, 90, 0, 0.42);
      transition: transform 160ms ease, color 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .category-button:hover,
    .category-button:focus-visible,
    .category-button.active {
      transform: translateY(-3px);
      color: var(--green);
      border-color: var(--green);
      background: rgba(49, 88, 255, 0.18);
      box-shadow:
        4px 4px 0 rgba(255, 90, 0, 0.7),
        0 0 22px rgba(49, 243, 255, 0.24);
      outline: none;
    }

    .category-name {
      display: block;
      color: var(--amber);
      font-size: 17px;
      text-transform: uppercase;
    }

    .category-sub {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .stage {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: minmax(300px, 0.8fr) minmax(0, 1.2fr);
      gap: 18px;
      margin-top: -24px;
      padding: 20px;
      border: 1px solid rgba(255, 176, 0, 0.32);
      border-radius: 6px;
      background: rgba(4, 4, 8, 0.68);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
    }

    .stage-visual {
      position: relative;
      min-height: 360px;
      overflow: hidden;
      border: 1px solid rgba(49, 243, 255, 0.34);
      border-radius: 5px;
      background:
        radial-gradient(circle at 50% 42%, rgba(49, 243, 255, 0.22), transparent 9rem),
        radial-gradient(circle at 58% 58%, rgba(255, 176, 0, 0.18), transparent 14rem),
        linear-gradient(180deg, rgba(16, 16, 24, 0.78), rgba(0, 0, 0, 0.68));
    }

    .stage-visual::before {
      content: "";
      position: absolute;
      inset: 17% 12%;
      border: 2px solid var(--cyan);
      transform: rotateX(66deg) rotateZ(45deg);
      box-shadow:
        0 0 26px rgba(49, 243, 255, 0.7),
        inset 0 0 32px rgba(255, 176, 0, 0.28);
      animation: portalSpin 9s linear infinite;
    }

    .stage-visual::after {
      content: attr(data-glyph);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--amber);
      font-size: clamp(54px, 11vw, 140px);
      font-weight: 700;
      text-shadow:
        4px 0 0 var(--red),
        -4px 0 0 var(--blue),
        0 0 30px rgba(255, 176, 0, 0.8);
      animation: glyphFloat 3.4s ease-in-out infinite;
    }

    @keyframes portalSpin {
      from { transform: rotateX(66deg) rotateZ(0deg); }
      to { transform: rotateX(66deg) rotateZ(360deg); }
    }

    @keyframes glyphFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.04); }
    }

    .stage-copy {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 16px;
      padding: 4px;
    }

    .kicker {
      color: var(--green);
      font-size: 12px;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      color: var(--amber);
      font-size: clamp(34px, 6vw, 74px);
      line-height: 0.95;
      text-transform: uppercase;
      text-shadow:
        3px 0 0 var(--red),
        0 0 18px rgba(255, 176, 0, 0.8);
    }

    .description {
      max-width: 820px;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.65;
    }

    .featured {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      padding: 9px 12px;
      border: 1px solid currentColor;
      color: var(--cyan);
      background: rgba(0, 0, 0, 0.28);
      font-size: 12px;
      text-transform: uppercase;
      box-shadow: 3px 3px 0 rgba(255, 90, 0, 0.58);
    }

    .content-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .item {
      min-height: 132px;
      display: grid;
      align-content: space-between;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(255, 176, 0, 0.34);
      border-radius: 4px;
      background:
        linear-gradient(135deg, rgba(255, 90, 0, 0.14), transparent 48%),
        rgba(9, 9, 14, 0.76);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.36);
      transition: transform 170ms ease, border-color 170ms ease, box-shadow 170ms ease;
    }

    .item:hover {
      transform: translateY(-4px) rotateX(2deg);
      border-color: var(--cyan);
      box-shadow:
        0 18px 38px rgba(0, 0, 0, 0.45),
        0 0 22px rgba(49, 243, 255, 0.18);
    }

    .item-title {
      margin: 0;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .item-meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .future-strip {
      margin-top: 34px;
      display: grid;
      grid-template-columns: repeat(5, minmax(100px, 1fr));
      gap: 10px;
    }

    .future-tile {
      min-height: 78px;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(49, 243, 255, 0.44);
      border-radius: 4px;
      color: var(--muted);
      background: rgba(0, 0, 0, 0.2);
      text-transform: uppercase;
    }

    footer {
      padding: 34px 0 18px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .hero,
      .stage {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: auto;
        padding: 46px 0 38px;
      }

      .stage {
        margin-top: 0;
      }

      .stage-visual {
        min-height: 240px;
      }
    }

    @media (max-width: 620px) {
      .topbar-inner {
        display: block;
        padding: 12px 0;
      }

      .status {
        margin-top: 6px;
        text-align: left;
      }

      .category-grid,
      .content-list,
      .future-strip {
        grid-template-columns: 1fr;
      }

      .stage {
        padding: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="shader" aria-hidden="true"></canvas>

  <header class="topbar">
    <div class="topbar-inner">
      <a class="mark" href="#top">joynes.se</a>
      <div class="status">Drive-linked archive // no media in GitHub</div>
    </div>
  </header>

  <main id="top" class="shell">
    <section class="hero" aria-labelledby="site-title">
      <div class="intro">
        <h1 id="site-title">joynes</h1>
        <p class="tagline">A time tunnel for old music, games, films, pictures and text from the Joynes archive.</p>
      </div>

      <aside class="category-panel" aria-labelledby="choose-title">
        <p id="choose-title" class="panel-label">Choose a portal</p>
        <div id="categoryGrid" class="category-grid"></div>
      </aside>
    </section>

    <section class="stage" aria-live="polite">
      <div id="stageVisual" class="stage-visual" data-glyph="M"></div>
      <div class="stage-copy">
        <div id="stageKicker" class="kicker"></div>
        <h2 id="stageTitle"></h2>
        <p id="stageDescription" class="description"></p>
        <div id="stageFeatured" class="featured"></div>
      </div>
    </section>

    <section id="contentList" class="content-list" aria-label="Selected archive items"></section>

    <section class="future-strip" aria-label="Future archive areas">
      <div class="future-tile">Music</div>
      <div class="future-tile">Games</div>
      <div class="future-tile">Films</div>
      <div class="future-tile">Pictures</div>
      <div class="future-tile">Texts</div>
    </section>

    <footer>
      joynes.se // HTML on GitHub Pages // archive files linked directly from Google Drive
    </footer>
  </main>

          ["Jaro och Grodan text archive", "Older story and game text versions", [["HTML text", "https://drive.google.com/file/d/16jFiNjv4vfuRefvvHL8g0iaE1PreIs4P/view"], ["TXT", "https://drive.google.com/file/d/1RjWP_br7_hB3nXTyGAK3mQVBDyTyGz6s/view"], ["DOC", "https://drive.google.com/file/d/1l8bAP98Ac3xKZM-Ye3L6Q6Q9v41i5W_U/view"], ["HTML 2", "https://drive.google.com/file/d/1DgCPYL3dIXpRvkaE0WDutDa21QfUnEh9/view"], ["HTML 3", "https://drive.google.com/file/d/1qTDyptn7FQcV3DiUKFJuuWV3iKLKD8ID/view"]]],

    const grid = document.querySelector("#categoryGrid");
    const visual = document.querySelector("#stageVisual");
    const kicker = document.querySelector("#stageKicker");
    const title = document.querySelector("#stageTitle");
    const description = document.querySelector("#stageDescription");
    const featured = document.querySelector("#stageFeatured");
    const list = document.querySelector("#contentList");

    function linkButton(label, href) {
      const a = document.createElement("a");
      a.className = "button";
      a.textContent = label;
      a.href = href;
      return a;
    }

    function renderCategory(category) {
      document.querySelectorAll(".category-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.category === category.id);
      });

      visual.dataset.glyph = category.glyph;
      kicker.textContent = category.kicker;
      title.textContent = category.title;
      description.textContent = category.description;

      featured.replaceChildren(...category.featured.map(([label, href]) => linkButton(label, href)));

      list.replaceChildren(...category.items.map(([name, meta, actions]) => {
        const article = document.createElement("article");
        article.className = "item";

        const head = document.createElement("div");
        const h3 = document.createElement("h3");
        h3.className = "item-title";
        h3.textContent = name;
        const p = document.createElement("p");
        p.className = "item-meta";
        p.textContent = meta;
        head.append(h3, p);

        const actionRow = document.createElement("div");
        actionRow.className = "item-actions";
        actions.forEach(([label, href]) => actionRow.append(linkButton(label, href)));

        article.append(head, actionRow);
        return article;
      }));
    }

    categories.forEach((category) => {
      const button = document.createElement("button");
      button.className = "category-button";
      button.type = "button";
      button.dataset.category = category.id;
      button.innerHTML = `<span class="category-name"></span><span class="category-sub"></span>`;
      button.querySelector(".category-name").textContent = category.name;
      button.querySelector(".category-sub").textContent = category.sub;
      button.addEventListener("click", () => renderCategory(category));
      grid.append(button);
    });

    renderCategory(categories[0]);

    const canvas = document.querySelector("#shader");
    const gl = canvas.getContext("webgl", { antialias: false, alpha: false });

    if (gl) {
      const vertexSource = `
        attribute vec2 position;
        void main() {
          gl_Position = vec4(position, 0.0, 1.0);
        }
      `;

      const fragmentSource = `
        precision mediump float;
        uniform vec2 resolution;
        uniform float time;

        float wave(vec2 p, float speed, float scale) {
          return sin(p.x * scale + time * speed) + cos(p.y * scale * 0.8 - time * speed * 0.7);
        }

        void main() {
          vec2 uv = gl_FragCoord.xy / resolution.xy;
          vec2 p = (uv - 0.5) * vec2(resolution.x / resolution.y, 1.0);
          float v = wave(p, 1.2, 7.0) + wave(p.yx + 0.35, 0.9, 10.0);
          float tunnel = 0.08 / max(0.08, abs(length(p) - 0.32 + 0.04 * sin(time + p.x * 6.0)));
          vec3 sega = vec3(0.02, 0.04, 0.12) + vec3(0.02, 0.18, 0.26) * (v * 0.08 + 0.18);
          vec3 amber = vec3(1.0, 0.42, 0.0) * tunnel * 0.22;
          vec3 cyan = vec3(0.0, 0.7, 1.0) * smoothstep(0.86, 0.12, length(p + vec2(0.16, -0.06))) * 0.18;
          vec3 red = vec3(0.9, 0.02, 0.08) * smoothstep(0.8, 0.1, length(p - vec2(0.22, 0.08))) * 0.13;
          float scan = 0.88 + 0.12 * sin(gl_FragCoord.y * 2.4);
          gl_FragColor = vec4((sega + amber + cyan + red) * scan, 1.0);
        }
      `;

      function shader(type, source) {
        const compiled = gl.createShader(type);
        gl.shaderSource(compiled, source);
        gl.compileShader(compiled);
        return compiled;
      }

      const program = gl.createProgram();
      gl.attachShader(program, shader(gl.VERTEX_SHADER, vertexSource));
      gl.attachShader(program, shader(gl.FRAGMENT_SHADER, fragmentSource));
      gl.linkProgram(program);
      gl.useProgram(program);

      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
      const position = gl.getAttribLocation(program, "position");
      gl.enableVertexAttribArray(position);
      gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

      const resolution = gl.getUniformLocation(program, "resolution");
      const time = gl.getUniformLocation(program, "time");
      let start = performance.now();

      function draw(now) {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const width = Math.floor(innerWidth * dpr);
        const height = Math.floor(innerHeight * dpr);
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
          gl.viewport(0, 0, width, height);
        }
        gl.uniform2f(resolution, width, height);
        gl.uniform1f(time, (now - start) / 1000);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    }
  </script>
